
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AZRE DealDesk</title>
    <!-- Added typography plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 4px; }
      .dark ::-webkit-scrollbar-track { background: #1f2937; }
      .dark ::-webkit-scrollbar-thumb { background: #374151; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
    <script>
      // Initialize theme on load
      try {
        const savedTheme = localStorage.getItem('azre-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // Force dark mode if no preference is saved, or if saved is dark/system
        if (!savedTheme || savedTheme === 'dark' || (savedTheme === 'system' && systemDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    </script>

  }
}
</script>
